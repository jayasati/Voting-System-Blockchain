<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>🗳️ Decentralized Voting</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;padding:30px}
    h1{text-align:center;font-size:2rem;color:#a78bfa;margin-bottom:4px}
    .subtitle{text-align:center;color:#555;font-size:0.85rem;margin-bottom:24px}

    .topbar{display:flex;justify-content:space-between;align-items:center;
            background:#1e1e2e;border-radius:10px;padding:12px 20px;margin-bottom:20px;flex-wrap:wrap;gap:10px}
    #wallet-info{font-size:0.85rem;color:#aaa}
    #role-badge{font-size:0.75rem;padding:3px 10px;border-radius:20px;font-weight:bold}
    .role-admin{background:#312e81;color:#a78bfa;border:1px solid #a78bfa}
    .role-voter{background:#064e3b;color:#34d399;border:1px solid #34d399}
    #connect-btn{padding:10px 22px;background:#7c3aed;color:#fff;border:none;border-radius:8px;cursor:pointer}
    #connect-btn:disabled{background:#3f3f5f;cursor:not-allowed}

    .info-row{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
    .badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:0.8rem;font-weight:bold}
    .badge.active{background:#064e3b;color:#34d399}
    .badge.inactive{background:#450a0a;color:#f87171}
    #vote-status-bar{font-size:0.85rem;color:#fbbf24}
    #status{text-align:center;margin-bottom:16px;font-size:0.9rem;min-height:20px}

    /* ── ADMIN PANEL ── */
    #owner-panel{
      background:#13132a;
      border:2px solid #7c3aed;
      border-radius:14px;
      padding:22px;
      max-width:560px;
      margin:0 auto 30px;
    }
    #owner-panel .panel-header{
      display:flex;align-items:center;gap:10px;margin-bottom:16px;
    }
    #owner-panel .panel-header span{
      background:#312e81;color:#a78bfa;
      font-size:0.72rem;font-weight:bold;
      padding:2px 10px;border-radius:20px;border:1px solid #a78bfa;
    }
    #owner-panel h3{color:#a78bfa;font-size:1.1rem}
    .owner-row{display:flex;gap:10px;margin-bottom:10px}
    #new-candidate-input{flex:1;padding:10px;background:#0f0f1a;border:1px solid #3f3f5f;
                         border-radius:8px;color:#e0e0e0;font-size:0.9rem}
    #add-candidate-btn{padding:10px 18px;background:#7c3aed;color:#fff;border:none;border-radius:8px;cursor:pointer}
    #toggle-voting-btn{width:100%;padding:10px;border-radius:8px;cursor:pointer;font-weight:bold;
                       background:#1a0a0a;color:#f87171;border:1px solid #f87171}

    /* ── VOTER SECTION ── */
    #voter-section{max-width:800px;margin:0 auto}
    #voter-section h2{color:#888;font-size:0.9rem;text-align:center;
                      margin-bottom:20px;text-transform:uppercase;letter-spacing:2px}

    #candidates-container{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-bottom:30px}
    .candidate-card{background:#1e1e2e;border:1px solid #2e2e4e;border-radius:12px;
                    padding:24px;width:190px;text-align:center;transition:transform 0.2s}
    .candidate-card:hover{transform:translateY(-4px)}
    .candidate-name{font-size:1.1rem;font-weight:bold;color:#a78bfa;margin-bottom:6px}
    .vote-count{font-size:2rem;font-weight:bold;color:#34d399;margin-bottom:4px}
    .vote-count span{font-size:0.75rem;color:#888;display:block}
    .vote-bar{height:6px;background:#2e2e4e;border-radius:3px;margin-bottom:14px;overflow:hidden}
    .vote-bar-fill{height:100%;background:#7c3aed;border-radius:3px;transition:width 0.5s}
    .vote-btn{padding:10px;background:#7c3aed;color:#fff;border:none;
              border-radius:8px;cursor:pointer;font-size:0.9rem;width:100%}
    .vote-btn:hover{background:#6d28d9}
    .vote-btn:disabled{background:#2e2e4e;color:#555;cursor:not-allowed}

    #winner-box{background:#1e1e2e;border:2px solid #a78bfa;border-radius:12px;
                padding:24px;text-align:center;max-width:400px;margin:0 auto 20px}
    #winner-box h2{color:#a78bfa;margin-bottom:10px}
    #winner-name{font-size:1.8rem;color:#34d399;font-weight:bold}
    #winner-votes{color:#888;font-size:0.9rem;margin-top:6px}

    .btn-row{display:flex;gap:10px;justify-content:center;margin:16px 0}
    #refresh-btn{padding:10px 24px;background:#1e1e2e;color:#a78bfa;
                 border:1px solid #a78bfa;border-radius:8px;cursor:pointer}

    #tx-log{background:#1e1e2e;border-radius:10px;padding:16px;
            max-width:700px;margin:20px auto;font-size:0.78rem;color:#888}
    #tx-log h3{color:#a78bfa;margin-bottom:10px}
    #tx-list{list-style:none;max-height:100px;overflow-y:auto}
    #tx-list li{padding:4px 0;border-bottom:1px solid #2e2e4e;word-break:break-all}
    #tx-list li span{color:#34d399}
  </style>
</head>
<body>

<h1>🗳️ Decentralized Voting</h1>
<p class="subtitle">Powered by Ethereum · Hardhat Local Network</p>

<!-- Top bar -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <div id="wallet-info">🦊 Not connected</div>
    <span id="role-badge" style="display:none"></span>
  </div>
  <button id="connect-btn">🦊 Connect MetaMask</button>
</div>

<!-- Status row -->
<div class="info-row">
  <span class="badge active" id="status-badge">● Voting Active</span>
  <span id="vote-status-bar"></span>
</div>
<div id="status"></div>

<!-- ADMIN PANEL (hidden until owner connects) -->
<div id="owner-panel" style="display:none">
  <div class="panel-header">
    <h3>⚙️ Admin Panel</h3>
    <span>👑 OWNER ONLY</span>
  </div>
  <div class="owner-row">
    <input id="new-candidate-input" type="text" placeholder="Enter new candidate name..."/>
    <button id="add-candidate-btn">➕ Add</button>
  </div>
  <button id="toggle-voting-btn">⏸ Pause Voting</button>
</div>

<!-- VOTER SECTION -->
<div id="voter-section">
  <h2>🗳️ Cast Your Vote</h2>
  <div id="candidates-container">
    <p style="color:#555;text-align:center">Connect wallet to load candidates...</p>
  </div>

  <div id="winner-box">
    <h2>🏆 Current Leader</h2>
    <div id="winner-name">—</div>
    <div id="winner-votes"></div>
  </div>

  <div class="btn-row">
    <button id="refresh-btn">🔄 Refresh Results</button>
  </div>
</div>

<!-- TX Log -->
<div id="tx-log">
  <h3>📜 Transaction Log</h3>
  <ul id="tx-list"><li>No transactions yet</li></ul>
</div>

<script src="app.js" type="module"></script>
</body>
</html>
